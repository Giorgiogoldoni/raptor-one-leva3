<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Raptor One – Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
        }
        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            text-align: center;
        }
        img {
            width: 100%;
            border-radius: 8px;
        }
        .ticker {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h1>Raptor One – Dashboard Multi‑Ticker</h1>

<div class="grid">
    <div class="card"><div class="ticker">LQQ</div><img src="../charts/LQQ.png"></div>
    <div class="card"><div class="ticker">CL2</div><img src="../charts/CL2.png"></div>
    <div class="card"><div class="ticker">LBUL</div><img src="../charts/LBUL.png"></div>
    <div class="card"><div class="ticker">QQQ3</div><img src="../charts/QQQ3.png"></div>
    <div class="card"><div class="ticker">3GOL</div><img src="../charts/3GOL.png"></div>
    <div class="card"><div class="ticker">3SIL</div><img src="../charts/3SIL.png"></div>
    <div class="card"><div class="ticker">3BAL</div><img src="../charts/3BAL.png"></div>
    <div class="card"><div class="ticker">3AAP</div><img src="../charts/3AAP.png"></div>
    <div class="card"><div class="ticker">3AMD</div><img src="../charts/3AMD.png"></div>
    <div class="card"><div class="ticker">3NVD</div><img src="../charts/3NVD.png"></div>
    <div class="card"><div class="ticker">3AMZ</div><img src="../charts/3AMZ.png"></div>
    <div class="card"><div class="ticker">3BAB</div><img src="../charts/3BAB.png"></div>
    <div class="card"><div class="ticker">3LNV</div><img src="../charts/3LNV.png"></div>
    <div class="card"><div class="ticker">3CON</div><img src="../charts/3CON.png"></div>
    <div class="card"><div class="ticker">3NGS</div><img src="../charts/3NGS.png"></div>
    <div class="card"><div class="ticker">3EUL</div><img src="../charts/3EUL.png"></div>
    <div class="card"><div class="ticker">3EUS</div><img src="../charts/3EUS.png"></div>
    <div class="card"><div class="ticker">3LMI</div><img src="../charts/3LMI.png"></div>
    <div class="card"><div class="ticker">3LCO</div><img src="../charts/3LCO.png"></div>
    <div class="card"><div class="ticker">3SFB</div><img src="../charts/3SFB.png"></div>
    <div class="card"><div class="ticker">SBA3</div><img src="../charts/SBA3.png"></div>
</div>

</body>
</html>
